name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run check:wording
      - run: npm run check:alpha-ui
      - run: npm run build
